name: Find and post board game deals

# No `schedule:` trigger here on purpose: Keepa rejects requests from
# GitHub Actions' datacenter IP ranges (confirmed -- the exact same call
# succeeds from a residential connection and fails with REQUEST_REJECTED
# from here, twice, with tokens available). The real schedule runs locally
# via scripts/run_local.ps1 + a Windows Scheduled Task -- see README.md.
# This workflow is kept as a manual fallback in case Keepa ever allowlists
# GitHub's ranges; flip it back on by re-adding a schedule trigger.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dealbot-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python src/main.py

      # Commits the regenerated site + dedupe log + category cache back to the repo.
      - name: Commit updated site and log
        run: |
          git config user.name "boardgame-dealbot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/ posted_log.json config/category_cache.json
          git diff --cached --quiet || git commit -m "Update deals $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
