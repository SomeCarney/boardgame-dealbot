# Master definitions for all Best Board Games ranked lists.
# Monthly update_rankings.py re-fetches Keepa data and recomputes order.
# Blurbs are editorial — they do not change on monthly refresh.
#
# Ranking formula:  score = rating^2 * log10(reviews) / log10(sales_rank)
# "all-time" list uses editorial_rank (1 = best) as primary; formula breaks ties.
# To add a game: add its ASIN here and to the relevant list(s).

games:
  B07YQ641NQ:
    title: "Wingspan"
    players: "1-5"
    time: "40-70 min"
    age: "10+"
    editorial_rank: 5
    blurb: >
      The game that convinced skeptics board games had grown up. Build a bird sanctuary by chaining
      habitat powers into an engine that feels different every play. Won the Kennerspiel des Jahres 2019
      and hasn't left the bestseller charts since.

  B077MZ2MPW:
    title: "Azul"
    players: "2-4"
    time: "30-45 min"
    age: "8+"
    editorial_rank: 8
    blurb: >
      Tile-drafting so tactically rich that tournament players study it. Drafting what you need while
      denying your opponent what they need is the entire game — and it works in 30 minutes with anyone
      from an 8-year-old to a chess grandmaster.

  B01GSYA4K2:
    title: "Terraforming Mars"
    players: "1-5"
    time: "120 min"
    age: "12+"
    editorial_rank: 4
    blurb: >
      The flagship engine-building strategy game. Manage oxygen, temperature, and ocean coverage across
      hundreds of project cards while corporations compete to claim Mars. Long, complex, and deeply
      satisfying in a way few games match.

  B014DMSTXK:
    title: "7 Wonders Duel"
    players: "2 only"
    time: "30 min"
    age: "10+"
    editorial_rank: 9
    blurb: >
      Dense civilization strategy in 30 minutes — the rare case where the 2-player spinoff outshines
      the original. Three distinct win conditions mean every game ends differently, and the tension
      of knowing your opponent might win on science never lets up.

  B0DYK1ZH2D:
    title: "Catan"
    players: "3-4"
    time: "60-120 min"
    age: "10+"
    editorial_rank: 20
    blurb: >
      The game that launched the modern board game renaissance. Negotiate, trade, and build settlements
      on a modular island that's different every game. Its flaws are real — longest game ever when someone
      leads — but its cultural impact makes it undeniably essential.

  B0F8PKN4B7:
    title: "Ticket to Ride"
    players: "2-5"
    time: "45-75 min"
    age: "8+"
    editorial_rank: 19
    blurb: >
      Claim railway routes across North America before rivals block the paths you need. Elegant enough to
      teach anyone in 10 minutes, tense enough that adults play it seriously. The definitive
      gateway strategy game for families.

  B08F65MX4L:
    title: "7 Wonders"
    players: "2-7"
    time: "30 min"
    age: "10+"
    editorial_rank: 17
    blurb: >
      Simultaneous card-drafting lets seven people finish a full civilization game in 30 minutes.
      Each player pursues their wonder's unique strategy while watching what the neighbors are building.
      Plays in the same time regardless of player count.

  B093H8RGXX:
    title: "Cascadia"
    players: "1-4"
    time: "30-45 min"
    age: "10+"
    editorial_rank: 12
    blurb: >
      Draft terrain hexes and wildlife tokens to build a Pacific Northwest ecosystem. The puzzle of
      fitting animals into their scoring patterns against a ticking token supply is deeply satisfying —
      calm on the surface, genuinely strategic underneath.

  B0FJMQB63N:
    title: "Codenames"
    players: "2-8+"
    time: "15-30 min"
    age: "10+"
    editorial_rank: 16
    blurb: >
      The spymaster's constraint — one word must connect multiple targets — makes this a masterclass
      in lateral thinking. The whole table argues about every clue. One of the best games ever designed
      for a mixed group of any size.

  B00A2HD40E:
    title: "Pandemic"
    players: "2-4"
    time: "45 min"
    age: "8+"
    editorial_rank: 15
    blurb: >
      The cooperative game that defined the genre. Race to cure four diseases before outbreaks cascade
      out of control — and they will cascade, because the board state shifts dramatically with every
      draw. Nothing beats the "we almost had it" feeling when you lose.

  B01F46RPS4:
    title: "King of Tokyo"
    players: "2-6"
    time: "30 min"
    age: "8+"
    editorial_rank: 22
    blurb: >
      Roll Yahtzee-style dice, smash Tokyo, absorb damage, buy power cards. The risk calculus of
      staying in the monster-infested city long enough to score points but not so long you get
      eliminated is genuinely interesting in a 30-minute game.

  B09KWZMXLX:
    title: "Camel Up"
    players: "2-8"
    time: "30 min"
    age: "8+"
    editorial_rank: 24
    blurb: >
      Camels race around a track while physically stacking on each other — the one on top carries
      the rest. Bet on the leg winner, the race winner, and the loser simultaneously. Gleefully
      chaotic, statistically fascinating, and always funny.

  B0CHD8RCSJ:
    title: "Sky Team"
    players: "2 only"
    time: "15 min"
    age: "14+"
    editorial_rank: 11
    blurb: >
      Two pilots land a plane without talking during critical phases. Place dice in shared slots,
      manage speed and flaps in real time, don't crash. Voted Game of the Year 2024 — the most
      innovative cooperative design in years.

  B010HEZHII:
    title: "Coup"
    players: "2-6"
    time: "15 min"
    age: "14+"
    editorial_rank: 23
    blurb: >
      Bluff your way through a corrupt dystopian court in 15 minutes. Everyone has two hidden
      influence cards; claim any power you want and dare someone to call you out. The best
      "one more game" game ever made.

  B0BF57RNPC:
    title: "Splendor Duel"
    players: "2 only"
    time: "30 min"
    age: "10+"
    editorial_rank: 13
    blurb: >
      The tighter, more tactical two-player take on gem-collecting engine building. Three asymmetric
      win conditions and a gem board you share and fight over makes every turn a negotiation with
      your own long-term strategy.

  B08R2BPLSN:
    title: "Skull"
    players: "3-6"
    time: "15-45 min"
    age: "10+"
    editorial_rank: 25
    blurb: >
      Three rules. Infinite mind games. Place flowers and skulls face-down, then bet on how many
      tiles you can flip without hitting a skull. The brilliance is that you know where your own
      skulls are, and so does everyone watching you.

  B0GKBFFRBW:
    title: "Ticket to Ride Europe"
    players: "2-5"
    time: "45-75 min"
    age: "8+"
    editorial_rank: 18
    blurb: >
      The European map introduces tunnels (commit to a route that might cost extra) and ferries
      (require locomotive wildcards). The added uncertainty makes the routing decisions more
      interesting than the original — many players' preferred version of the game.

  B01MXWTYLF:
    title: "Othello"
    players: "2 only"
    time: "20 min"
    age: "7+"
    editorial_rank: 28
    blurb: >
      One of the most studied abstract strategy games in history. Flip your opponent's discs by
      surrounding them — simple to learn in two minutes, pursued at competitive levels with opening
      theory as deep as chess by those who go down the rabbit hole.

  B09BSP7B7V:
    title: "Dixit"
    players: "3-6"
    time: "30 min"
    age: "8+"
    editorial_rank: 21
    blurb: >
      Describe a dreamlike illustration with a clue that's neither too obvious nor too cryptic.
      The clue-giver scores only if some players guess right — if everyone gets it, no points.
      Beautiful, cross-generational, and consistently delightful.

  B013TJ5P80:
    title: "Mysterium"
    players: "2-7"
    time: "42 min"
    age: "10+"
    editorial_rank: 14
    blurb: >
      One player is a ghost communicating only through abstract vision cards; others are psychics
      interpreting those visions as murder clues. The gap between what the ghost means and what
      the psychics understand is where all the comedy and tension lives.

  B07T446163:
    title: "Wavelength"
    players: "2-12"
    time: "30-45 min"
    age: "14+"
    editorial_rank: 26
    blurb: >
      A dial with a hidden target on a spectrum (like "hot ↔ cold"). Give a clue placing your
      clue ON the spectrum; your team argues where on the dial the target landed. The debate
      is the game and it's reliably funnier than it sounds.

  B0F692PJDW:
    title: "Telestrations"
    players: "4-8"
    time: "30 min"
    age: "12+"
    editorial_rank: 27
    blurb: >
      Telephone meets Pictionary. Draw a phrase, pass it; the next person writes what they think
      was drawn; the next draws what was written. By the last player, 'mermaid' has become 'toilet
      surfboard'. Produces some of the funniest moments in gaming.

  B07KLWPHFF:
    title: "Lost Cities: The Card Game"
    players: "2 only"
    time: "30 min"
    age: "10+"
    editorial_rank: 30
    blurb: >
      Play cards to five expeditions — but each expedition only scores if you've committed enough
      to it. Start one too early and you're committed to a losing path; start too late and the race
      is over. Compact, tense, and impossible to play just once.

  B0079L0EKY:
    title: "Hive Pocket"
    players: "2 only"
    time: "20 min"
    age: "9+"
    editorial_rank: 29
    blurb: >
      No board — the tiles ARE the board, and it expands as you place pieces. A pure abstract
      strategy game about surrounding the opponent's queen bee, playable on any flat surface,
      that improves meaningfully with every session.

  B08WJHV6H8:
    title: "Carcassonne: Hunters & Gatherers"
    players: "2-5"
    time: "35 min"
    age: "8+"
    editorial_rank: 10
    blurb: >
      The prehistoric reimagining that many players argue is the best version of Carcassonne.
      Rivers score differently, forests replace cities, and the overall flow feels more
      cohesive. Teach it in two minutes; play it for years.

  B0FJMNPGXM:
    title: "Codenames Duet"
    players: "2"
    time: "15-30 min"
    age: "11+"
    editorial_rank: null
    blurb: >
      The cooperative version where both players act as spymaster simultaneously. Your clues
      must contact your partner's agents and avoid theirs — since you have different information,
      miscommunication is guaranteed and hilarious.

  B0D9KSDVDZ:
    title: "Everdell Duo"
    players: "2 only"
    time: "30-60 min"
    age: "14+"
    editorial_rank: null
    blurb: >
      The beloved forest city-builder rebuilt specifically for two, with its own asymmetric
      storyline and exclusive cards. The charming woodland theme meets real engine-building
      depth in a purpose-made two-player experience.

  B0DFF3V1Q7:
    title: "Lord of the Rings: Duel for Middle-Earth"
    players: "2 only"
    time: "30-45 min"
    age: "10+"
    editorial_rank: null
    blurb: >
      Light and Shadow vie for control across iconic Middle-Earth locations in a strategic
      push-and-pull card game. The gorgeous production does justice to the license, and the
      asymmetric factions play noticeably differently.

  B09S3ZJJRM:
    title: "The Chameleon"
    players: "3-8"
    time: "15 min"
    age: "14+"
    editorial_rank: null
    blurb: >
      One player secretly is the Chameleon — they don't know the secret word but must bluff
      their way through. Give a clue that's not too obvious (the Chameleon will copy you)
      but not so cryptic that others suspect YOU. Perfect 15-minute opener.

  B00M07OQ1U:
    title: "Monikers"
    players: "4-16"
    time: "30-60 min"
    age: "17+"
    editorial_rank: null
    blurb: >
      Three rounds with the same card deck: describe it any way, then only one word, then only
      gestures. By round three everyone remembers the failed descriptions from round one and
      loses it entirely. One of the funniest party games ever made.

  B07H185K6H:
    title: "Trekking the National Parks"
    players: "2-5"
    time: "30-60 min"
    age: "10+"
    editorial_rank: null
    blurb: >
      Race your hikers across a gorgeous map of the US national parks, collecting trail cards
      and claiming sites before rivals. Accessible to families while offering real strategic
      decisions about when to race versus when to stockpile.

  B007MHIYFM:
    title: "Chronology"
    players: "2-8"
    time: "30 min"
    age: "14+"
    editorial_rank: null
    blurb: >
      Build a personal timeline by correctly placing historical events in chronological order.
      Your timeline grows longer (and easier to place into) as you succeed — a clever self-
      balancing mechanic that keeps everyone competitive regardless of history knowledge.

  B0F9HS5FK5:
    title: "Exploding Kittens: The Board Game"
    players: "2-5"
    time: "20 min"
    age: "7+"
    editorial_rank: null
    blurb: >
      The physical board game version of the wildly popular card game — now with a shared
      board and new mechanics. Still fundamentally a fast, silly Russian roulette of
      kittens, explosions, and card-drawing chaos.

  B01LZXVN4P:
    title: "Gloomhaven"
    players: "1-4"
    time: "60-120 min"
    age: "12+"
    editorial_rank: 1
    blurb: >
      The most ambitious board game ever published — a 95-scenario legacy dungeon-crawl where
      characters permanently retire and the story world evolves from your choices. It held #1 on
      BoardGameGeek for years. Nothing else at this scope exists in the hobby.

  B00RKT2AIK:
    title: "Pandemic Legacy: Season 1"
    players: "2-4"
    time: "60 min"
    age: "13+"
    editorial_rank: 2
    blurb: >
      Twelve months of pandemic campaigns where your failures have permanent consequences —
      cities get stickers, characters get scars, rules change mid-game. The most acclaimed
      legacy game ever made and the one that made the legacy format mainstream.

  B077Y9C5MK:
    title: "Spirit Island"
    players: "1-4"
    time: "90-120 min"
    age: "13+"
    editorial_rank: 3
    blurb: >
      Play as nature spirits defending a colonized island. Every spirit has a radically
      different power set and playstyle; the interaction between them at higher player counts
      creates emergent strategies that no designer could have fully predicted.

  B01M0J3HM7:
    title: "Scythe"
    players: "1-5"
    time: "90-115 min"
    age: "14+"
    editorial_rank: 6
    blurb: >
      Dieselpunk Eastern Europe, 1920s. Build mechs, harvest resources, and expand territory
      in a game where combat is a threat more often than a reality. Stunning production values
      and a strategic depth that rewards patient, long-horizon play.

  B07MJ62HJK:
    title: "Root"
    players: "2-4"
    time: "60-90 min"
    age: "10+"
    editorial_rank: 7
    blurb: >
      Four asymmetric factions — cats, birds, woodland creatures, and vagabonds — each playing
      by entirely different rules on the same board. The faction matchups create wildly different
      games every session. One of the most innovative designs of the last decade.

  B01MZF1SXY:
    title: "Dominion"
    players: "2-4"
    time: "30 min"
    age: "13+"
    editorial_rank: null
    blurb: >
      The game that invented the deck-building genre. Start with a weak hand of copper and
      estates; buy kingdom cards; shuffle; repeat until your deck becomes a machine. Still
      the cleanest, most replayable implementation of the mechanic it created.

  B07GRXS5HD:
    title: "One Night Ultimate Werewolf"
    players: "3-10"
    time: "10 min"
    age: "8+"
    editorial_rank: null
    blurb: >
      A single night phase, a single vote. Roles shift during the night; by morning nobody
      is quite sure what they are. The accusations, logic, and chaos of a standard werewolf
      game compressed into a perfectly repeatable 10-minute package.

  B009SAAV0C:
    title: "The Resistance: Avalon"
    players: "5-10"
    time: "30 min"
    age: "13+"
    editorial_rank: null
    blurb: >
      Merlin knows who the spies are but can't say so directly. The loyal servants must
      identify the spies through deduction and voting — while the spies try to figure out
      who Merlin is and assassinate them at the end. The best social deduction game for
      five or more players.

  B00SGYYK0S:
    title: "Viticulture Essential Edition"
    players: "1-6"
    time: "45-90 min"
    age: "13+"
    editorial_rank: null
    blurb: >
      Run a Tuscan vineyard through the seasons — plant, harvest, age wine, and fulfill
      orders. The worker placement is clean; the seasonal rhythm is satisfying; the solo
      Automa opponent is one of the best AI systems in the hobby.

  B01MSQ8WD6:
    title: "Friday"
    players: "1 only"
    time: "25 min"
    age: "13+"
    editorial_rank: null
    blurb: >
      A solo deck-builder where you play Friday helping Robinson Crusoe survive and eventually
      fight pirates. Thin in production but deeply strategic — every card you add to Robinson's
      deck or remove from it is a meaningful permanent decision.

  B0BPMKCSHW:
    title: "That's Not a Hat"
    players: "3-8"
    time: "15-20 min"
    age: "8+"
    editorial_rank: null
    blurb: >
      Memory meets bluffing — pass gifts around a circle, but nobody can look at what they
      don't hold. Accept a gift you think doesn't match what you were told, or call out
      the bluffer. Short, loud, and great at any age.

  B010TQY7A8:
    title: "Exploding Kittens"
    players: "2-5"
    time: "15 min"
    age: "7+"
    editorial_rank: null
    blurb: >
      Draw a card. If it explodes, you're out — unless you have a defuse card. Use action
      cards to skip, shuffle, or steal your way to survival. One of the most-funded Kickstarters
      ever and still a reliable 15-minute laugh.

  B01AYL6OPE:
    title: "Sushi Go Party!"
    players: "2-8"
    time: "20 min"
    age: "8+"
    editorial_rank: null
    blurb: >
      Draft sushi plates around the table, collecting sets and combos for points. The expanded
      Party version adds customizable menu boards that give every game a different strategic
      feel. One of the best drafting games for any group size.

  B07DLGD9K6:
    title: "Disney Villainous"
    players: "2-6"
    time: "40-80 min"
    age: "10+"
    editorial_rank: null
    blurb: >
      Each player is an iconic Disney villain pursuing their own unique objective on their
      own board — while rivals play hero cards into your realm to slow you down. The asymmetry
      is real and the theme is executed beautifully.

  B004MRZGM8:
    title: "Betrayal at House on the Hill"
    players: "3-6"
    time: "60 min"
    age: "12+"
    editorial_rank: null
    blurb: >
      Explore a haunted house tile by tile until the Haunt triggers — at which point one
      player becomes the traitor. Fifty different haunts mean radically different scenarios
      each game. Uneven but memorable in a way few games match.

  B07GML2NHN:
    title: "Wits & Wagers Party"
    players: "3-18"
    time: "25 min"
    age: "10+"
    editorial_rank: null
    blurb: >
      Trivia where you don't need to know the answer — you bet on whose guess is closest.
      Scales to enormous groups, plays in 25 minutes, and rewards reading the room over
      obscure knowledge. The best party trivia game format yet invented.

  B08D6KLTGJ:
    title: "Quoridor"
    players: "2-4"
    time: "15 min"
    age: "6+"
    editorial_rank: null
    blurb: >
      Move your pawn to the other side while placing walls to block your opponent — but you
      can never fully seal them off. A pure spatial abstract that's approachable in minutes
      and studied seriously by players who pursue it.

  B07ZTMQS89:
    title: "Parks"
    players: "1-5"
    time: "40-70 min"
    age: "10+"
    editorial_rank: null
    blurb: >
      Hike trails through stunning national park artwork, collecting resources and visiting
      parks before the seasons change. One of the most beautiful games on the market, with
      enough strategic decision-making to keep experienced players engaged.

  B00RCCAOSI:
    title: "Patchwork"
    players: "2 only"
    time: "15-30 min"
    age: "8+"
    editorial_rank: null
    blurb: >
      Draft polyomino patches to fill your personal quilt, balancing button income against
      empty spaces. A 30-minute puzzle game that's genuinely deep — every placement has
      downstream consequences you only see after the fact.

  B0856MGJTM:
    title: "Hanabi"
    players: "2-5"
    time: "25 min"
    age: "8+"
    editorial_rank: null
    blurb: >
      Hold your cards facing OUT — you can't see them, only your teammates can. Give limited
      hints to help the group play fireworks in the right order. A cooperative memory game
      that's harder than it looks and deeply satisfying when it clicks.

  B08C3P7TZF:
    title: "Sagrada"
    players: "1-4"
    time: "30-45 min"
    age: "14+"
    editorial_rank: null
    blurb: >
      Draft colorful dice to fill stained glass window boards, following color and shade
      placement rules. The shared dice pool means everyone affects everyone else's plans.
      Beautiful on the table and mechanically elegant.

